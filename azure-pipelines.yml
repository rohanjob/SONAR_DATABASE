trigger:
branches:
include:
- main
- develop

pr:
branches:
include:
- main

pool:
vmImage: 'ubuntu-latest'

variables:
dockerRegistryServiceConnection: 'ssp-books-acr'
imageRepository: 'ssp-books-database'
containerRegistry: 'sspbooksacr.azurecr.io'
dockerfilePath: 'Dockerfile'
tag: '$(Build.BuildId)'
sonarQubeServiceConnection: 'SonarQube-Service'
sonarProjectKey: 'ssp_books_database'
sonarProjectName: 'SSP Books Database'

stages:

* stage: Setup
  displayName: Install Tools
  jobs:

  * job: InstallTools
    steps:

    * script: |
      sudo apt-get update
      sudo apt-get install -y docker.io postgresql-client curl unzip
      curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      docker --version
      psql --version
      az --version
      displayName: Install Required Tools

* stage: CodeQuality
  dependsOn: Setup
  jobs:

  * job: Sonar
    steps:

    * task: SonarQubePrepare@6
      inputs:
      SonarQube: '$(sonarQubeServiceConnection)'
      scannerMode: 'CLI'
      configMode: 'manual'
      cliProjectKey: '$(sonarProjectKey)'
      cliProjectName: '$(sonarProjectName)'
      cliSources: '.'
      extraProperties: |
      sonar.language=plsql
      sonar.sources=.
      sonar.inclusions=**/*.sql

    * task: SonarQubeAnalyze@6

    * task: SonarQubePublish@6
      inputs:
      pollingTimeoutSec: '300'

* stage: Validate
  dependsOn: CodeQuality
  jobs:

  * job: ValidateSQL
    steps:

    * script: |
      docker run -d --name pg-validate 
      -e POSTGRES_PASSWORD=testpass 
      -e POSTGRES_DB=validate_db 
      -p 5433:5432 
      postgres:16-alpine

      sleep 10

      PGPASSWORD=testpass psql -h localhost -p 5433 -U postgres -d validate_db -f init.sql
      PGPASSWORD=testpass psql -h localhost -p 5433 -U postgres -d validate_db -f seed.sql

      docker stop pg-validate
      docker rm pg-validate
      displayName: Validate SQL

* stage: Build
  dependsOn: Validate
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  * job: BuildPush
    steps:

    * task: Docker@2
      inputs:
      command: build
      repository: '$(imageRepository)'
      dockerfile: '$(dockerfilePath)'
      containerRegistry: '$(dockerRegistryServiceConnection)'
      tags: |
      $(tag)
      latest

    * task: Docker@2
      inputs:
      command: push
      repository: '$(imageRepository)'
      containerRegistry: '$(dockerRegistryServiceConnection)'
      tags: |
      $(tag)
      latest

* stage: Deploy
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  * job: DeployDB
    steps:

    * script: echo "Database deployment completed"
